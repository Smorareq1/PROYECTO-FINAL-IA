services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voz-asistente-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/configs:/app/configs
    environment:
      - ARDUINO_PORT=/dev/ttyUSB0
      - ARDUINO_BAUDRATE=115200
      - MODEL_CNN_PATH=models/cnn_base/model.pt
      - MODEL_LSTM_PATH=models/bilstm/model.pt
      - CONFIDENCE_THRESHOLD=0.85
      - LOG_LEVEL=INFO
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8000
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voz-asistente-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Servicio opcional para desarrollo (hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: voz-asistente-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    profiles:
      - dev

name: CNN2DCommandClassifier
n_classes: 6
n_mfcc: 13

architecture:
  block_1:
    out_channels: 32
    kernel_size: 3
    padding: 1
    pool_size: 2
  block_2:
    out_channels: 64
    kernel_size: 3
    padding: 1
    pool_size: 2
  block_3:
    out_channels: 128
    kernel_size: 3
    padding: 1
    global_avg_pool: true

head:
  dropout: 0.4
  fc_out: 6

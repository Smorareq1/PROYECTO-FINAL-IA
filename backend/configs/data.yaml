sample_rate: 16000
audio_format: wav
bit_depth: 16
channels: 1
duration_seconds: 2.0

paths:
  raw: data/raw
  processed: data/processed
  augmented: data/augmented
  splits: data/splits
  speakers: data/speakers.csv

# Clases del modelo. Coinciden con los strings que el sketch Arduino acepta
# (excepto ruido_fondo, que es la clase de rechazo del modelo).
classes:
  simple:
    - enciende
    - apaga
    - detente
    - rojo
    - verde
    - azul
    - ruido_fondo
  compound:
    - blanco
    - procesando
    - alarma
    - tono

splits:
  train: 0.70
  val: 0.15
  test: 0.15
  stratify_by_speaker: true
